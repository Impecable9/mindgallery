<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindGallery | The Art of Thought</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Inter:wght@300;400;500;600&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
              classic: ['Merriweather', 'serif'],
              hand: ['Dancing Script', 'cursive'],
              outfit: ['Outfit', 'sans-serif'],
            },
            colors: {
              'glass-border': 'rgba(255, 255, 255, 0.1)',
              'glass-surface': 'rgba(255, 255, 255, 0.05)',
              'brand-dark': '#0f172a',
              'cosmic-purple': '#6366f1',
              'cosmic-blue': '#3b82f6',
            },
            boxShadow: {
              'frame': '0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.3)',
              'inner-matte': 'inset 0 0 20px rgba(0,0,0,0.05)',
              'glow': '0 0 20px rgba(99, 102, 241, 0.4)',
            },
            animation: {
              'gradient-xy': 'gradient-xy 15s ease infinite',
              'shimmer': 'shimmer 2s linear infinite',
            },
            keyframes: {
              'gradient-xy': {
                '0%, 100%': { 'background-size': '400% 400%', 'background-position': '0% 50%' },
                '50%': { 'background-size': '200% 200%', 'background-position': '100% 50%' }
              },
              'shimmer': {
                'from': { 'backgroundPosition': '0 0' },
                'to': { 'backgroundPosition': '-200% 0' }
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        /* Default background set in App.tsx via classes */
        overflow-x: hidden;
      }
      /* Hide scrollbar for clean UI */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(100, 116, 139, 0.5);
        border-radius: 4px;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",

    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "html2canvas": "https://esm.sh/html2canvas@1.4.1",
    "jspdf": "https://esm.sh/jspdf@2.5.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
